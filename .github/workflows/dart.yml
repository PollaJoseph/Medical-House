name: iOS Ad-Hoc Build (Diawi)

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Ad-Hoc Build
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Install dependencies
        run: flutter pub get

      - name: Force iOS 15.5 Target & Fix Dependencies
        run: |
          # 1. Force the Xcode project targets to 15.5
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.5;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 2. Force the Podfile platform to 15.5
          sed -i '' "s/.*platform :ios.*/platform :ios, '15.5'/g" ios/Podfile

          # 3. FIX BUNDLE ID: Replace 'com.medicalhouse.app' with your actual registered ID
          sed -i '' 's/com.example.medicalHouse/com.medicalhouse.app/g' ios/Runner.xcodeproj/project.pbxproj

          # 4. FIX SwiftTryCatch Syntax: 
          # This replaces the specific target line with TWO lines to ensure proper spacing
          sed -i '' "s/target 'Runner' do/target 'Runner' do\\
            pod 'SwiftTryCatch', :git => 'https://github.com/michaeltyson\/SwiftTryCatch.git', :tag => '0.0.1'/g" ios/Podfile
            
      - name: Clean CocoaPods
        run: |
          rm -rf Pods
          rm -f Podfile.lock
        working-directory: ios

      - name: Install Pods
        run: pod install --repo-update
        working-directory: ios

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build Ad-Hoc IPA
        run: flutter build ipa --release --export-method ad-hoc

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-AdHoc-Release
          path: build/ios/ipa/*.ipa
